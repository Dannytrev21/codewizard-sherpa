# Seventh CI workflow — `docs-deploy` — publishes the mkdocs-material site to
# GitHub Pages on every push to master.
#
# Separation from `docs.yml`:
#   - `docs.yml` runs on every PR (validate `mkdocs build --strict`); no
#     pages permissions required.
#   - `docs-deploy.yml` (this file) runs ONLY on push to master; deploys
#     the built site to GitHub Pages with narrowly-scoped pages permissions.
#
# Concurrency group `pages` with `cancel-in-progress: false` matches the
# GitHub-recommended pattern (deploys must not be cancelled mid-flight).
#
# Repository configuration required (one-time, manual):
#   Settings → Pages → Source: GitHub Actions

name: docs-deploy

on:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - ".github/workflows/docs-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
      - name: Install dev extras (mkdocs-material)
        run: python -m pip install -e ".[dev]"
      - name: Build docs (mkdocs --strict)
        run: make docs
      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b  # v5.0.0
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3.0.1
        with:
          path: ./site

  deploy:
    name: deploy
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4.0.5
