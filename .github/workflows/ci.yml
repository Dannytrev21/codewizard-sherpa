# Six-job CI for codewizard-sherpa.
#
# This workflow owns five of the six jobs: `lint`, `typecheck`, `test`,
# `security`, and `fence`. The sixth — `docs` — lives in the sibling
# `.github/workflows/docs.yml` so it can be path-filtered at the workflow
# level (AC-12 Option B); that honors the ≤90s p95 walltime advisory from
# phase-arch-design.md §Testing strategy / CI gates without polluting the
# six-job decomposition with an extra `changes` setup job.
#
# `fence` is the load-bearing ADR-0002 / production-ADR-0005 gate. Do NOT
# disable, broaden, or "simplify" without an ADR amendment.
#
# CODEOWNERS-route this file when CODEOWNERS lands in S5-02; pin reviews to
# phase-arch-design.md §Edge cases #15.
name: ci

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

# Default-deny posture (Phase 0). Individual jobs MUST NOT widen `contents`
# beyond `read`; future SARIF uploads in Phase 3+ may add `security-events:
# write` only on the job that needs it. Asserted by tests/unit/test_ci_workflow.py.
permissions:
  contents: read

# One run per ref — new pushes cancel older runs. `cancel-in-progress: true`
# is load-bearing (CI quota); advisory-only would let stale runs burn budget.
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: lint — ruff check + ruff format --check + import-linter structural
  # cold-start defense. `make lint-imports` is intentionally invoked here
  # (NOT under `typecheck`) per phase-arch-design.md §Testing strategy / CI
  # gates and S1-05 AC-6.
  # ---------------------------------------------------------------------------
  lint:
    name: lint
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
        os: ["ubuntu-24.04"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: ${{ matrix.python }}
      - name: Install dev extras
        run: python -m pip install -e ".[dev]"
      - name: Lint (ruff)
        run: make lint
      - name: Lint imports (import-linter, structural cold-start defense)
        run: make lint-imports

  # ---------------------------------------------------------------------------
  # Job 2: typecheck — mypy --strict on src/.
  # ---------------------------------------------------------------------------
  typecheck:
    name: typecheck
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.11"
      - name: Install dev extras
        run: python -m pip install -e ".[dev]"
      - name: Type-check (mypy --strict)
        run: make typecheck

  # ---------------------------------------------------------------------------
  # Job 3: test — full pytest suite. The 85% coverage floor (line + branch)
  # is enforced via `addopts` in pyproject.toml; no per-CI override.
  # ---------------------------------------------------------------------------
  test:
    name: test
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.11"
      - name: Install dev extras
        run: python -m pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q
      # S5-01 — bench canaries. `bench-collection-guard` is GATING: if a
      # future change renames the marker or filters a file the collection
      # falls below 3 and the job fails. `bench` itself is ADVISORY
      # (`continue-on-error: true`); the cold-start canary is variance-prone
      # on shared CI runners (`phase-arch-design.md §Edge cases row 12`).
      # `bench-results.json` is uploaded as a workflow artifact so a future
      # PR-comment action (filed against Phase 1) can consume it.
      - name: bench-collection-guard
        run: |
          set -euo pipefail
          collected=$(pytest --collect-only -m bench tests/bench/ -q --no-header --no-cov 2>/dev/null | grep -c '::test_' || true)
          echo "bench tests collected: ${collected}"
          if [ "${collected}" -ne 3 ]; then
            echo "expected exactly 3 bench tests (S5-01); got ${collected}" >&2
            exit 1
          fi
      - name: bench (advisory)
        continue-on-error: true
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: pytest tests/bench/ -m bench -q --tb=short --no-cov
      - name: Upload bench-results.json
        if: always()
        # actions/upload-artifact v4.4.3 — SHA-pinned per ADR-0002. Do NOT
        # replace with `@v4` (floating tag); the SHA is the supply-chain
        # anchor.
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: bench-results
          path: bench-results.json
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Job 4: security — pip-audit + osv-scanner against uv.lock.
  # Severity gating: HIGH/CRITICAL fail the job; MEDIUM/LOW are advisory
  # (per phase-arch-design.md §Testing strategy / CI gates job 4).
  # ---------------------------------------------------------------------------
  security:
    name: security
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.11"
      - name: Install dev extras (pip-audit)
        run: python -m pip install -e ".[dev]"
      - name: pip-audit (PyPI advisories against uv.lock)
        # pip-audit reads name+version from uv.lock entries. The shell
        # pipeline extracts `name = "<x>"` + the adjacent `version = "<y>"`
        # so pip-audit can resolve advisories deterministically without
        # asking pip to re-resolve the environment.
        run: |
          python - <<'PY' > /tmp/requirements-from-uv.txt
          import re, pathlib
          text = pathlib.Path("uv.lock").read_text()
          pkgs = re.findall(r'\[\[package\]\]\s*\nname = "([^"]+)"\nversion = "([^"]+)"', text)
          for name, version in pkgs:
              print(f"{name}=={version}")
          PY
          # ``--no-deps`` is required alongside ``--disable-pip`` per
          # pip-audit's CLI contract (otherwise pip-audit refuses to skip
          # pip resolution unless the requirements file is hashed). We
          # extract concrete name==version pairs from uv.lock above, so
          # there's nothing for pip to re-resolve.
          pip-audit --strict --disable-pip --no-deps --requirement /tmp/requirements-from-uv.txt
      - name: osv-scanner (uv.lock)
        # v1.9.1: the action lives at the ``osv-scanner-action`` subpath,
        # NOT the repo root (the root ``action.yml`` has no ``runs:``
        # section by design — see ``CONTRIBUTING.md`` upstream). The SHA
        # remains pinned per ADR-0002.
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2  # v2.3.8
        with:
          scan-args: |-
            --lockfile=uv.lock
            --fail-on-severity=HIGH

  # ---------------------------------------------------------------------------
  # Job 5: fence — the load-bearing ADR-0002 gate.
  #
  # The install is two-step on purpose: a bare `pip install -e .` measures
  # the actual gather-pipeline closure (ADR-0006 §Consequences); pytest is
  # then installed STANDALONE as the harness so the closure measurement is
  # uncontaminated by `[dev]`. Do NOT install `[dev]`, `[agents]`, or
  # `[service]` here — asserted by tests/unit/test_ci_workflow.py.
  # ---------------------------------------------------------------------------
  fence:
    name: fence
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.11"
      - name: Install bare distribution (closure measurement)
        run: pip install -e .
      - name: Install pytest (harness, STANDALONE)
        run: pip install pytest
      - name: Run fence test
        # ``-o "addopts="`` overrides pyproject's ``--cov=...`` switches
        # which require ``pytest-cov`` — the fence job deliberately
        # installs ``pytest`` STANDALONE (no [dev]) per ADR-0006 so the
        # gather-pipeline closure measurement stays uncontaminated.
        run: pytest -q -o "addopts=" tests/unit/test_pyproject_fence.py
