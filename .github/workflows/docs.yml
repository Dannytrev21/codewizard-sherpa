# Sixth CI job — `docs` — split out per AC-12 Option B of story S1-05.
#
# `mkdocs build --strict` runs only when files under `docs/**` or `mkdocs.yml`
# change. That keeps the ≤90s p95 walltime advisory honored for non-docs PRs
# without polluting the six-job decomposition in `ci.yml` with an extra
# `changes` setup job.
name: docs

on:
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
  push:
    branches: [master]
    paths:
      - "docs/**"
      - "mkdocs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    name: docs
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
      - name: Install dev extras (mkdocs-material)
        run: python -m pip install -e ".[dev]"
      - name: Build docs (mkdocs --strict)
        run: make docs
