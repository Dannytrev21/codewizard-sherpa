# Weekly dependency updates for pip + GitHub Actions.
# Caps open PRs per ecosystem so updates don't drown reviews mid-phase.
version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    ignore:
      # v2.x removed `--fail-on-severity` (CLI breaking change). Migration
      # is docs-led, not a 1:1 dependabot bump — defer until we author a
      # hand-rolled PR against v2's SARIF + post-filter pattern. See
      # closed PR #11 for context.
      - dependency-name: "google/osv-scanner-action"
        update-types: ["version-update:semver-major"]
