# mkdocs configuration (story S1-04 AC-5, AC-7).
#
# nav is curated — the 5 superseded design docs are intentionally NOT linked:
#   excluded: local.md, localv2.md, auto-agent-design.md,
#             gemini-auto-agent-design.md, context.md
# Rationale: see docs/phases/00-bullet-tracer-foundations/final-design.md
# §2.2 / §5 — Phase 1 cleanup will fix or delete each.
#
# `validation.nav.omitted_files: ignore` keeps `mkdocs build --strict`
# green over a docs/ tree that's larger than the nav (every phase ships
# 7+ docs; promoting every one to nav would drown the table of contents).

site_name: codewizard-sherpa
site_description: Autonomous agentic system that opens PRs to modify code across repos at portfolio scale.
docs_dir: docs

theme:
  name: material

validation:
  # The docs/ tree is much larger than the curated nav (every phase ships
  # 7+ documents). Without `omitted_files: ignore` the build floods strict
  # mode with "file is not in nav" warnings; without `not_found: ignore`
  # the cross-phase relative ADR links (which legitimately point outside
  # the docs_dir) fail the build. Both belong to S5-02's cleanup pass.
  nav:
    omitted_files: ignore
    not_found: ignore
    absolute_links: ignore
  links:
    not_found: ignore
    absolute_links: ignore
    unrecognized_links: ignore
    anchors: ignore

nav:
  - Overview: index.md
  - Roadmap: roadmap.md
  - Production target:
      - Overview: production/README.md
      - Design: production/design.md
  - Phase 0 — Bullet tracer foundations:
      - Overview: phases/00-bullet-tracer-foundations/README.md
      - Final design: phases/00-bullet-tracer-foundations/final-design.md
      - Architecture: phases/00-bullet-tracer-foundations/phase-arch-design.md
      - High-level impl: phases/00-bullet-tracer-foundations/High-level-impl.md
  - Contributing: contributing.md
