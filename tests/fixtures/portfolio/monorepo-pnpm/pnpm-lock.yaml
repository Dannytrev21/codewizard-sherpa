lockfileVersion: '6.0'

settings:
  autoInstallPeers: true
  excludeLinksFromLockfile: false

importers:
  .:
    devDependencies:
      typescript:
        specifier: ^5.3.0
        version: 5.3.0

  packages/app:
    dependencies:
      '@monorepo-pnpm/lib-a':
        specifier: workspace:*
        version: link:../lib-a
      '@monorepo-pnpm/lib-b':
        specifier: workspace:*
        version: link:../lib-b
      express:
        specifier: ^4.18.2
        version: 4.18.2

  packages/lib-a: {}

  packages/lib-b:
    dependencies:
      '@monorepo-pnpm/lib-a':
        specifier: workspace:*
        version: link:../lib-a

packages: {}
